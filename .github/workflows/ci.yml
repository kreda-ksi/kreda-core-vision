name: CI
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: install deps
        run: sudo apt-get update && sudo apt-get install -y cmake libopencv-dev
      - name: configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: build
        run: cmake --build build -j
      - name: test
        run: ctest --test-dir build --output-on-failure -j

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: clang-format
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find src -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format --dry-run -Werror

  tidy:
    runs-on: ubuntu-latest
    steps:
     - uses: actions/checkout@v7
     - name: install deps
       run: sudo apt-get update && sudo apt-get install -y clang-tidy cmake libopencv-dev
     - name: configure
       run: cmake -B build
     - name: clang-tidy
       run: run-clang-tidy -p build -quiet
