name: CI
on: [push, pull_request]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: clang-format
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          find src -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-format --dry-run -Werror
